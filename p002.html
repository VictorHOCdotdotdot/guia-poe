    <h1>Ato II</h1>
    <ol>
        <li><input type="checkbox" id="item1"><label for="item1"><b>The Southern Forest</b> - Siga a parede sentido norte até The Forest Emcampment - Entre em The Old Fields (Cima)</label></li>

        <li><input type="checkbox" id="item2"><label for="item2"><b>The Old Fields</b> - Vá até Crossroads</label></li>

        <li><input type="checkbox" id="item3"><label for="item3"><b>The Crossroads</b> - Siga a estrada até o WP - Vá para a cima/esquerda até Chamber of Sins Level 1</label></li>

        <li><input type="checkbox" id="item4"><label for="item4"><b>The Chamber of Sins Level 1</b>- Vá até o level 2 - <b>Faça o <span class="trial">Trial</span></b> - Mate o <span class="matar">Fidelitas</span>, pegue a <span class="pegar">Baleful Gem</span> - Vá para a cidade.</label></li>

        <li><input type="checkbox" id="item5"><label for="item5"><b>Cidade</b> - Fale com os NPCs - WP para Crossroads</label></li>

        <li><input type="checkbox" id="item6"><label for="item6"><b>The Crossroads</b> - Vá para cima/direita e entre em Broken Bridge - siga a estrada até o WP - Mate <span class="matar">Kraityn</span> - pegue <span class="pegar">Kraityn's Amulet</span> - Vá para a cidade</label></li>

        <li><input type="checkbox" id="item7"><label for="item7"><b>Cidade</b> - WP para Crossroads - Vá para direita/baixo até The Fellshrine Ruins - Entre em The Crypt Level 1</label></li>

        <li><input type="checkbox" id="item8"><label for="item8"><b>The Crypt Level 1</b> - <b>Faça o Trial</b> - Vá para The Crypt Level 2 - Pegue <span class="pegar">Golden Hand</span> - Vá para a cidade - Fale com Yeena</label></li>

        <li><input type="checkbox" id="item9"><label for="item9"><b>Cidade</b> - Vá para The Riverways (Baixo)</label></li>

        <li><input type="checkbox" id="item10"><label for="item10"><b>The Riverways</b> - Siga a estrada até o WP - Vá até The Western Forest</label></li>

        <li><input type="checkbox" id="item11"><label for="item11"><b>The Western Forest</b> - Siga a estrada até o WP - Vá para a esquerda/cima na estrada quebrada e encontre Alira - <b>SALVE ALIRA</b> - Volte para o WP e continue descendo a estrada para matar o <span class="matar">Captain Arteri</span> e abrir a passagem - Vá para o lado oposto de Alira e encontre The Weaver's Chambers</label></li>

        <li><input type="checkbox" id="item12"><label for="item12"><b>The Weaver's Chambers</b>- Vá até The Weaver's Nest - Mate <span class="matar">The Weaver</span> - Pegue <span class="pegar">Maligaro's Spike</span> - Volte para a cidade - Fale com os NPCs - WP para Ato I - Fale com Bestel para pegar o skill point - WP para The Riverways - Encontre The Wetlands</label></li>

        <li><input type="checkbox" id="item13"><label for="item13"><b>The Wetlands</b> - Mate <span class="matar">Oak</span> - Pegue <span class="pegar">Oak's Amulet</span> - Encontre o WP e libere a passagem e entre em The Vaal Ruins</label></li>

        <li><input type="checkbox" id="item14"><label for="item14"><b>The Northern Forest</b> - Encontre o WP e volte para Western Forest - Fale com Alira para pegar <span class="pegar">The Apex</span> e volte para Northern Forest - Vá para The Caverns</label></li>

        <li><input type="checkbox" id="item15"><label for="item15"><b>The Caverns</b> - Encontre o WP e vá para Ancient Pyramid - Entre The Pyramid Apex</label></li>

        <li><input type="checkbox" id="item16"><label for="item16"><b>The Pyramid Apex</b> - Ative o Dark Altar - Mate o <span class="matar">Vaal Orversoul</span> - Vá para o <a href="p003.html">Ato III</a></label></li>
    </ol>
