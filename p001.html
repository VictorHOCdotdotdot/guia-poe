    <h1>Ato I</h1>
    <ol>
        <li>
            <input type="checkbox" id="item1">
            <label for="item1"><b>The Twilight Strand</b> - Mate o <span class="matar">Hillock</span> - Vá para Lioneye's Watch</label>
        </li>
        <li>
            <input type="checkbox" id="item2">
            <label for="item2"><b>Lioneye's Watch</b> - Fale com os NPCs - Vá para The Coast</label>
        </li>
        <li>
            <input type="checkbox" id="item3">
            <label for="item3"><b>The Coast</b> - Pegue o Waypoint (WP) - Vá para The Mud Flats</label>
        </li>
        <li>
            <input type="checkbox" id="item4">
            <label for="item4"><b>The Mud Flats</b> - Siga as partes com água e pegue os 3 <span class="pegar">Glifos</span> - Vá para The Submerged Passage</label>
        </li>
        <li>
            <input type="checkbox" id="item5">
            <label for="item5"><b>The Submerged Passage</b> - Pege o WP (Waypoint) para The Coast - Entre em The Tidal Island - Mate o <span class="matar">Hailrake</span> - Pegue o <span class="pegar">Medicine Chest</span> - Volte para a cidade - Fale com os NPCs - Pegue o TP para The Submerged Passage</label>
        </li>
        <li>
            <input type="checkbox" id="item6">
            <label for="item6"><b>The Submerged Passage</b> - Procure pela escada e use um Portal Scroll, depois diriga-se até The Ledge</label>
        </li>
        <li>
            <input type="checkbox" id="item7">
            <label for="item7"><b>The Ledge</b> - Pegue o WP - Vá para The Climb - Vá para Lower Prison - Pegue o WP - Volte para a cidade.</label>
        </li>
        <li>
            <input type="checkbox" id="item8">
            <label for="item8"><b>Cidade</b> - Pegue o portal de volta para Submerged Passage - Procure o The Flooded Depths - Mate o <span class="matar">Dweller of the Deep</span> - Volte para a cidade - WP para The Lower Prison</label>
        </li>
        <li>
            <input type="checkbox" id="item9">
            <label for="item9"><b>Lower Prison</b> - <b>Faça o <span class="trial">Trial</span></b> - Vá para Upper Prison - Siga o rastro de sangue - Mate o <span class="matar">Brutus</span> depois siga para Prisoner's Gate, pegue o WP e volte para cidade para pegar as recompensas</label>
        </li>
        <li>
            <input type="checkbox" id="item10">
            <label for="item10"><b>Cidade</b> - WP para Prisoner's Gate - The Ship Graveyard</label>
        </li>
        <li>
            <input type="checkbox" id="item11">
            <label for="item11"><b>The Ship Graveyard</b> - Encontre Ship Graveyard Cave e coloque um portal depois encontre Cavern of Wrath - Pegue o WP para a cidade</label>
        </li>
        <li>
            <input type="checkbox" id="item12">
            <label for="item12"><b>Cidade</b> - Pegue o portal para The Ship Graveyard e entre em The Ship Graveyard Cave. Pegue a <span class="pegar">Allflame</span>, saia da caverna, mate o <span class="matar">Fairgraves</span> e volte para a cidade</label>
        </li>
        <li>
            <input type="checkbox" id="item13">
            <label for="item13"><b>Cidade</b> - WP para Cavern of Wrath - Encontre Cavern of Anger - Entre Merveil's Lair</label>
        </li>
        <li>
            <input type="checkbox" id="item14">
            <label for="item14"><b>Merveil's Lair</b> - <span class="matar">Mate Merveil</span> - Vá para o <a href="p002.html">Ato II</a></label>
        </li>
    </ol>
